workflows:
  # ========================================
  # iOS App Store Workflow
  # ========================================
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: App Store Connect

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.complyhealth.app

      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        BUNDLE_ID: "com.complyhealth.app"
        APP_STORE_APPLE_ID: 6756626678  # Update with your App Store Connect app ID

      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Get Flutter packages
        script: |
          cd frontend
          flutter packages pub get

      - name: Update Local databases
        script: |
          if [ -f "./run_with_update" ]; then
            chmod +x ./run_with_update
            ./run_with_update
          else
            echo "No update script found, skipping..."
          fi
          
      - name: Generate Hive type adapters
        script: |
          cd frontend
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        script: |
          cd frontend
          flutter analyze

      - name: Flutter test
        script: |
          cd frontend
          flutter test
        ignore_failure: false

      - name: Build iOS app
        script: |
          cd frontend
          flutter build ipa --release
          
          echo "=== Checking build outputs ==="
          ls -lah build/ios/ipa/ || echo "No IPA directory found"
          find build/ios -name "*.ipa" -type f || echo "No IPA files found"
          
    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - pndaRN.dev@proton.me
        notify:
          success: true
          failure: true

      app_store_connect:
        auth: integration
        submit_to_testflight: true
        
  # ========================================
  # iOS Firebase Distribution (Beta Testing)
  # ========================================
  ios-firebase-distribution:
    name: iOS Beta (Firebase)
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: App Store Connect

    environment:
      # Use automatic signing - CodeMagic will fetch certificates via App Store Connect
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.complyhealth.app

      groups:
        - firebase_credentials

      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        BUNDLE_ID: "com.complyhealth.app"

      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'develop'
          include: true
          source: true
        - pattern: 'beta/*'
          include: true
          source: true
      tag_patterns:
        - pattern: 'beta-*'
          include: true
        - pattern: 'v*-beta'
          include: true
      cancel_previous_builds: true

    scripts:
      # Removed manual keychain/certificate setup - using automatic signing instead
      
      - name: Get Flutter packages
        script: |
          cd frontend
          flutter packages pub get

      - name: Update Local databases
        script: |
          if [ -f "./run_with_update" ]; then
            chmod +x ./run_with_update
            ./run_with_update
          fi
          
      - name: Generate Hive type adapters
        script: |
          cd frontend
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        script: |
          cd frontend
          flutter analyze
        ignore_failure: true

      - name: Flutter test
        script: |
          cd frontend
          flutter test
        ignore_failure: true

      - name: Build iOS IPA for distribution
        script: |
          cd frontend
          flutter build ipa --release --export-method ad-hoc
          
          echo "=== Checking build outputs ==="
          ls -lah build/ios/ipa/ || echo "No IPA directory found"
          find build/ios -name "*.ipa" -type f || echo "No IPA files found"

    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      
    publishing:
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        ios:
          app_id: $FIREBASE_IOS_APP_ID
          groups:
            - iOS Testers

      email:
        recipients:
          - pndaRN.dev@proton.me
        notify:
          success: true
          failure: true
          
