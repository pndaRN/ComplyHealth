workflows:
  # ========================================
  # iOS TestFlight Workflow (main branch)
  # ========================================
  ios-testflight-workflow:
    name: iOS TestFlight Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: App Store Connect

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - appstore_credentials
      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    
    scripts:
      - name: Initialize Keychain
        script: |
          keychain initialize

      - name: Fetch or Create signing files
        script: |
          app-store-connect fetch-signing-files com.complyhealth.app \
            --type IOS_APP_STORE \
            --create 

      - name: Set up code signing settings on Xcode project
        script: |
          keychain add-certificates
          xcode-project use-profiles --warn-only

      - name: Get Flutter packages
        script: |
          cd frontend
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd frontend/ios
          pod install

      - name: Extract release notes from CHANGELOG
        script: |
          # Extract the latest version section (between first two ## headers)
          awk '/^## \[.*\] -/{if(found) exit; found=1} found' CHANGELOG.md > release_notes.txt
          echo "Release notes extracted:"
          cat release_notes.txt

      - name: Flutter build ipa
        script: |
          cd frontend
          flutter build ipa --release --build-number=$BUILD_NUMBER --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - frontend/flutter_drive.log

    publishing:
      email:
        recipients:
          - pndaRN.dev@proton.me
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # ========================================
  # iOS Firebase Workflow (develop branch)
  # ========================================
  ios-firebase-workflow:
    name: iOS Firebase Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: App Store Connect

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase_credentials
      ios_signing:
        provisioning_profiles:
          - AD_HOC
        certificates:
          - DISTRIBUTION_FIREBASE
      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
          source: true

    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          cd frontend
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd frontend/ios
          pod install

      - name: Extract release notes from CHANGELOG
        script: |
          # Extract the latest version section (between first two ## headers)
          awk '/^## \[.*\] -/{if(found) exit; found=1} found' CHANGELOG.md > release_notes.txt
          echo "Release notes extracted:"
          cat release_notes.txt
      - name: Flutter build ipa
        script: |
          cd frontend
          flutter build ipa --release --build-number=$BUILD_NUMBER --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - frontend/flutter_drive.log
      - release_notes.txt

    publishing:
      email:
        recipients:
          - pndaRN.dev@proton.me
        notify:
          success: true
          failure: true
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        ios:
          app_id: $FIREBASE_IOS_APP_ID
          groups:
            - ios-testers
