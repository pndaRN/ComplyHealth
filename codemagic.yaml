workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: App Store Connect  # Use the App Store Connect API key integration name configured in Codemagic

    environment:
      ios_signing:
        distribution_type: app_store  # or 'ad_hoc' for internal distribution
        bundle_identifier: com.complyhealth.app

      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        BUNDLE_ID: "com.complyhealth.app"
        APP_STORE_APPLE_ID: 6756626678  # Update with your App Store Connect app ID

      flutter: stable  # or specify version like '3.24.0'
      xcode: latest  # or specify version like '15.0'
      cocoapods: default

    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'develop'
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Set up keychain for code signing
        script: |
          keychain initialize

      - name: Set up code signing from uploaded profiles 
        script: |
          # Use the manually uploaded certificates and provisioning profiles
          xcode-project use-profiles

      - name: Set up signing certificate
        script: |
          keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          cd frontend
          flutter packages pub get

      - name: Update Local databases
        script: |
          chmod +x ./run_with_update
          ./run_with_update

      - name: Generate Hive type adapters
        script: |
          cd frontend
          flutter pub run build_runner build --delete-conflicting-outputs


      - name: Flutter analyze
        script: |
          cd frontend
          flutter analyze

      - name: Flutter test
        script: |
          cd frontend
          flutter test
        ignore_failure: true  # Set to false if you want tests to block the build

      - name: Clean Flutter build
        script: |
            cd frontend
            flutter clean
            flutter pub get

      - name: Build iOS app
        script: |
          cd frontend
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - frontend/flutter_drive.log

    publishing:
      email:
        recipients:
          - pndaRN.dev@proton.me
        notify:
          success: true
          failure: true

      app_store_connect:
        # Submit to App Store Connect
        # Requires APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_ID,
        # and APP_STORE_CONNECT_PRIVATE_KEY environment variables
        auth: integration
        
        # Automatically submit for beta testing
        submit_to_testflight: true
        
        # Optional: Automatically submit for App Store review
        # submit_to_app_store: true

  ios-firebase-distribution:
    name: iOS Firebase App Distribution
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.complyhealth.app

      groups:
        - firebase_credentials
        - appstore_credentials

      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        BUNDLE_ID: "com.complyhealth.app"

      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: 'develop'
          include: true
          source: true
        - pattern: 'release/*'
          include: true
          source: true
      tag_patterns:
        - pattern: 'beta-*'
          include: true
        - pattern: 'v*-beta'
          include: true

    scripts:
      - name: Set up keychain for code signing
        script: |
          keychain initialize

      - name: Set up signing certificate
        script: |
          keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          cd frontend
          flutter packages pub get

      - name: Update Local databases
        script: |
          chmod +x ./run_with_update
          ./run_with_update

      - name: Generate Hive type adapters
        script: |
          cd frontend
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        script: |
          cd frontend
          flutter analyze
        ignore_failure: true

      - name: Flutter test
        script: |
          cd frontend
          flutter test
        ignore_failure: true

      - name: Build iOS IPA for distribution
        script: |
          cd frontend
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - frontend/flutter_drive.log

    publishing:
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        ios:
          app_id: $FIREBASE_IOS_APP_ID

      email:
        recipients:
          - pndaRN.dev@proton.me
        notify:
          success: true
          failure: true
