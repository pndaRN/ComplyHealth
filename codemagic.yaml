workflows:
  # ========================================
  # iOS TestFlight Workflow (main branch)
  # ========================================
  ios-testflight-workflow:
    name: iOS TestFlight Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: App Store Connect

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - appstore_credentials
      ios_signing:
        provisioning_profiles:
          - APP_STORE_PROFILE
        certificates:
          - DISTRIBUTION_APP_STORE
      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          cd frontend
          flutter packages pub get

      - name: Install CocoaPods dependencies
        script: |
          cd frontend/ios
          pod install

      - name: Flutter build ipa
        script: |
          cd frontend
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - frontend/flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # ========================================
  # iOS Firebase Workflow (develop branch)
  # ========================================
  ios-firebase-workflow:
    name: iOS Firebase Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: App Store Connect

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase_credentials
      ios_signing:
        provisioning_profiles:
          - AD_HOC
        certificates:
          - DISTRIBUTION_CERTIFICATE
      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
          source: true

    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          cd frontend
          flutter packages pub get

      - name: Install CocoaPods dependencies
        script: |
          cd frontend/ios
          pod install

      - name: Flutter build ipa
        script: |
          cd frontend
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - frontend/flutter_drive.log

    publishing:
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        ios:
          app_id: $FIREBASE_IOS_APP_ID
          groups:
            - iOS Testers
