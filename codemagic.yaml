workflows:
# ========================================
  # iOS TestFlight Workflow (main branch)
  # ========================================
  ios-testflight-workflow:
    name: iOS TestFlight Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: App Store Connect

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - appstore_credentials 
      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Initialize Keychain
        script: |
          keychain initialize

      - name: Decode and Set up Code Signing
        script: |
          # 1. Prepare Provisioning Profile directory
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # 2. Decode files. We use 'tr -d' to strip any accidental null bytes
          echo "$CM_CERTIFICATE" | tr -d '\0' | base64 --decode > /tmp/certificate.p12
          echo "$CM_PROVISIONING_PROFILE" | tr -d '\0' | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision
          
          # 3. Add certificate to keychain
          # We wrap the password in quotes and use 'tr' to ensure it is clean
          CLEAN_PASS=$(echo "$CM_CERTIFICATE_PASSWORD" | tr -d '\0')
          keychain add-certificates \
            --certificate /tmp/certificate.p12 \
            --certificate-password "$CLEAN_PASS"

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --warn-only

      - name: Get Flutter packages
        script: |
          cd frontend
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd frontend/ios
          pod install

      - name: Flutter build ipa
        script: |
          cd frontend
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - pndaRN.dev@proton.me
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
