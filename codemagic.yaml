workflows:
  # ========================================
  # iOS TestFlight Workflow (main branch)
  # ========================================
  ios-testflight-workflow:
    name: iOS TestFlight Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: App Store Connect

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - appstore_credentials # Ensure CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, and CM_PROVISIONING_PROFILE are here
      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Initialize Keychain
        script: |
          keychain initialize

      - name: Decode and Set up Code Signing
        script: |
          # Create directory for the provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # Decode Base64 variables (created on Linux) into files on the Mac builder
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision
          
          # Install the certificate into the keychain
          keychain add-certificates \
            --certificate /tmp/certificate.p12 \
            --certificate-password "$CM_CERTIFICATE_
