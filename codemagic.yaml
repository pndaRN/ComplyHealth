  # ========================================
  # Android Firebase Distribution (Beta Testing)
  # ========================================
  android-firebase-distribution:
    name: Android Beta (Firebase)
    max_build_duration: 120
    instance_type: linux_x2

    environment:
      android_signing:
        - complyhealth_keystore

      groups:
        - firebase_credentials  # Contains FIREBASE_SERVICE_ACCOUNT and FIREBASE_ANDROID_APP_ID

      vars:
        PACKAGE_NAME: "com.complyhealth.app"

      flutter: stable
      java: 17

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'develop'
          include: true
          source: true
        - pattern: 'beta/*'
          include: true
          source: true
      tag_patterns:
        - pattern: 'beta-*'
          include: true
        - pattern: 'v*-beta'
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Set up local.properties
        script: |
          cd frontend/android
          cat >> local.properties << EOF
          flutter.sdk=$HOME/programs/flutter
          sdk.dir=$ANDROID_SDK_ROOT
          EOF

      - name: Get Flutter packages
        script: |
          cd frontend
          flutter packages pub get

      - name: Update local databases
        script: |
          if [ -f "./run_with_update" ]; then
            chmod +x ./run_with_update
            ./run_with_update
          fi

      - name: Generate Hive type adapters
        script: |
          cd frontend
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        script: |
          cd frontend
          flutter analyze
        ignore_failure: true

      - name: Flutter test
        script: |
          cd frontend
          flutter test
        ignore_failure: true

      - name: Build Android APK for distribution
        script: |
          cd frontend
          flutter build apk --release

    artifacts:
      - frontend/build/app/outputs/flutter-apk/*.apk
      - frontend/build/app/outputs/bundle/release/*.aab
      - frontend/build/app/outputs/mapping.txt

    publishing:
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        android:
          app_id: $FIREBASE_ANDROID_APP_ID
          groups:
            - Android Testers

      email:
        recipients:
          - pndaRN.dev@proton.me
        notify:
          success: true
          failure: true  
